<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ドローンZからにげろ！</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- メニュー画面 -->
        <div id="menu-screen" class="screen">
            <h1>ドローンZからにげろ！</h1>
            <p>かんきちを操作して、ドローンZから逃げ回れ！</p>
            <div class="main-layout">
                <div class="mode-buttons">
                    <button onclick="startGame('EASY')">かんたん (45秒)</button>
                    <button onclick="startGame('NORMAL')">ふつう (45秒)</button>
                    <button onclick="startGame('HARD')">むずかしい (45秒)</button>
                    <button onclick="startGame('ENDLESS')">エンドレス (無限)</button>
                </div>
                <div class="leaderboard-container">
                    <h3>🏆 ローカルランキング (エンドレス)</h3>
                    <div id="leaderboard-list">読み込み中...</div>
                </div>
            </div>
        </div>

        <!-- ゲームプレイ画面 -->
        <canvas id="gameCanvas" width="800" height="600" style="display: none;"></canvas>

        <!-- タッチ操作用バーチャルジョイスティック -->
        <div id="joystick-container">
            <div id="joystick-base">
                <div id="joystick-stick"></div>
            </div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="gameover-screen" class="screen" style="display: none;">
            <h1 class="danger">GAME OVER</h1>
            <p id="gameover-reason"></p>
            <p id="gameover-score"></p>

            <!-- コンティニュー用（残機がある場合のみ） -->
            <div id="continue-container" style="display: none; margin-bottom: 20px;">
                <p>しゅっせいだけの力で復活できます！</p>
                <button id="continue-button" class="accent-btn" onclick="continueGame()">コンティニューする</button>
            </div>

            <!-- スコア保存フォーム（エンドレス時のみ） -->
            <div id="ranking-input-container" style="display: none; margin-bottom: 20px;">
                <input type="text" id="player-name" placeholder="名前を入力" maxlength="10">
                <button onclick="submitLocalScore()">スコアを保存</button>
            </div>

            <button onclick="showMenu()">メニューに戻る</button>
        </div>

        <!-- ゲームクリア画面 -->
        <div id="clear-screen" class="screen" style="display: none;">
            <h1 class="success">GAME CLEAR!</h1>
            <p>45秒間逃げ切った！</p>
            <p id="clear-score"></p>
            <button onclick="showMenu()">メニューに戻る</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
